<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root {
            --usfs-red: #DA291C;
            --usfs-blue: #001489;
            --usfs-dark-blue: #010025;
            --usfs-grey: #666; 
        }

        body { font-family: 'Inter', sans-serif; background: transparent; margin: 0; padding: 0; }

        .staff-section-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 0;
        }

        .swiper { padding: 0 50px 30px 50px; }
        .staff-card { text-align: center; width: 100%; }

        .headshot-container {
            width: 100%;
            max-width: 160px; 
            aspect-ratio: 3 / 4;
            margin: 0 auto 10px auto;
            overflow: hidden;
            background: #eee;
            border-radius: 2px;
        }

        @media (max-width: 640px) {
            .headshot-container { max-width: 115px; }
        }

        .headshot { width: 100%; height: 100%; object-fit: cover; display: block; }

        .name { 
            display: block; 
            font-size: 0.85rem; 
            font-weight: 800; 
            font-style: italic; 
            color: var(--usfs-blue); 
            text-transform: uppercase;
            margin-bottom: 3px; 
            line-height: 1.1;
            padding: 0 4px;
        }

        .title { 
            font-size: 0.72rem; 
            color: var(--usfs-dark-blue);
            font-weight: 600; 
            text-transform: capitalize; 
            line-height: 1.2;
            padding: 0 6px;
            display: block;
        }

        .meta-text {
            font-size: 0.65rem;
            color: var(--usfs-grey);
            font-weight: 400;
            display: block;
            margin-top: 2px;
        }

        /* BRANDED ARROWS */
        .swiper-button-next, .swiper-button-prev {
            background-color: var(--usfs-dark-blue);
            width: 32px !important;
            height: 32px !important;
            border-radius: 50%;
            color: white !important;
            transition: background-color 0.3s ease;
        }

        .swiper-button-next:after, .swiper-button-prev:after { font-size: 0.8rem !important; font-weight: 900; }
        .swiper-button-next:hover, .swiper-button-prev:hover { background-color: var(--usfs-red); }
        .swiper-button-prev { left: 10px !important; }
        .swiper-button-next { right: 10px !important; }

        @media (max-width: 640px) {
            .swiper-button-next, .swiper-button-prev { display: none; }
            .swiper { padding: 0 10px 20px 10px; }
        }
    </style>
</head>
<body>

<div class="staff-section-wrapper">
    <div class="swiper">
        <div class="swiper-wrapper" id="staff-container"></div>
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTl6ClR8yzQgjnHgE4MqQIuoN3Q4ddsEvxEzpOljWKUVOoaw5xTRYQe_wcZTADn6QIU6Mph35nEi9KH/pub?gid=1900499015&single=true&output=tsv'; 
    const PLACEHOLDER_IMG = 'https://usfigureskating.org/images/2025/9/11/USFig-V-box.png';
    
    async function loadData() {
        try {
            const response = await fetch(TSV_URL);
            const text = await response.text();
            const rows = text.split('\n').slice(1); 
            
            const staffData = rows.map(row => {
                const cols = row.split('\t'); 
                const rawTitle = cols[1]?.trim() || "";
                
                let cleanTitle = rawTitle;
                let meta = "";
                
                // Splitting title and parentheses for better spacing
                if (rawTitle.includes('(')) {
                    cleanTitle = rawTitle.split('(')[0].trim();
                    meta = '(' + rawTitle.split('(')[1];
                }

                return {
                    name: cols[0]?.trim(),
                    title: cleanTitle,
                    meta: meta,
                    image: cols[3]?.trim() || PLACEHOLDER_IMG
                };
            }).filter(s => s.name);

            // SORTING REMOVED: Displays in the order of the Google Sheet
            renderStaff(staffData);
        } catch (e) { console.error(e); }
    }

    function renderStaff(data) {
        const container = document.getElementById('staff-container');
        container.innerHTML = data.map(p => `
            <div class="swiper-slide">
                <div class="staff-card">
                    <div class="headshot-container">
                        <img src="${p.image}" class="headshot" alt="${p.name}" onerror="this.src='${PLACEHOLDER_IMG}'">
                    </div>
                    <div class="name">${p.name}</div>
                    <div class="title">${p.title}</div>
                    ${p.meta ? `<div class="meta-text">${p.meta}</div>` : ''}
                </div>
            </div>
        `).join('');
        
        new Swiper('.swiper', {
            slidesPerView: 3,
            spaceBetween: 10, 
            loop: true,
            autoplay: { delay: 4000, disableOnInteraction: false },
            navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
            breakpoints: {
                640: { slidesPerView: 4, spaceBetween: 12 },
                1024: { slidesPerView: 6, spaceBetween: 15 } 
            }
        });
    }

    loadData();
</script>
</body>
</html>
